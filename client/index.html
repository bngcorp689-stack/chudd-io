<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chudd.io</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&display=swap" rel="stylesheet">
  
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #gameCanvas { display: block; background: #111; }
    #menuOverlay {
      position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);
      display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff;
    }
    #menuOverlay input, #menuOverlay button { margin:5px; padding:5px 10px; font-size:16px; }
    #deathOverlay {
  position: fixed; /* important: fixed covers the viewport */
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(0,0,0,0.7);
  color: red;
  font-size: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999; /* above everything else */
  display: none; /* hidden by default */
}
    #leaderboard {
      position:absolute; top:10px; right:10px; color:#fff;
      background:rgba(0,0,0,0.5); padding:10px; border-radius:8px;
    }
    #leaderboard h3 { margin:0 0 5px 0; font-size:18px; }
    #leaderboard ol { margin:0; padding-left:20px; }
  </style>


  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">

  
</head>
<body>
  <canvas id="gameCanvas" style="display:block; background-color:#2b2b18;"></canvas>

  <div id="menuOverlay">
    <h1 id ="gameTitle">Chudd.io</h1>
    <input id="usernameInput" placeholder="Username">
    <input id="passwordInput" type="password" placeholder="Password">
    <button id="joinBtn">Join Game</button>
    <button id="resetBtn">Reset Account</button>
    <div id="joinMessage"></div>
  </div>

  <div id="deathOverlay">YOU DIED</div>
  <div id="roundTimer" style="
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
    z-index: 100;
">Time Left: 3:00</div>
  <div id="roundOverlay">NEW ROUND!</div>
  <script src="/socket.io/socket.io.js"></script>
  
  
  <script src="game.js"></script>
</body>
</html>
